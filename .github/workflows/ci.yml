name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows MSVC
    runs-on: windows-2022

    env:
      VCPKG_ROOT: C:\vcpkg

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup vcpkg
        shell: pwsh
        run: |
          if (!(Test-Path "$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake")) {
            $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
            "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Verify tools
        shell: pwsh
        run: |
          cmake --version
          ninja --version
          if (!(Test-Path "$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake")) {
            throw "vcpkg toolchain not found at $env:VCPKG_ROOT"
          }

      - name: Configure
        shell: pwsh
        run: cmake --preset windows-ci

      - name: Build
        shell: pwsh
        run: cmake --build --preset windows-ci --parallel

      - name: Test
        shell: pwsh
        run: |
          $ctestOutput = ctest --preset windows-ci 2>&1
          $ctestExitCode = $LASTEXITCODE
          $ctestOutput
          if ($ctestExitCode -ne 0) {
            $message = ($ctestOutput -join "`n")
            $message = $message.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            "::error title=CTest failed::$message"
            exit $ctestExitCode
          }
