name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows MSVC
    runs-on: windows-2022

    env:
      VCPKG_ROOT: C:\vcpkg

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup vcpkg
        shell: pwsh
        run: |
          if (!(Test-Path "$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake")) {
            $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
            "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Verify tools
        shell: pwsh
        run: |
          cmake --version
          ninja --version
          if (!(Test-Path "$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake")) {
            throw "vcpkg toolchain not found at $env:VCPKG_ROOT"
          }

      - name: Configure
        shell: pwsh
        run: cmake --preset windows-ci

      - name: Build
        shell: pwsh
        run: cmake --build --preset windows-ci --parallel

      - name: Test
        shell: pwsh
        run: ctest --preset windows-ci

  windows-clang:
    name: Windows Clang
    runs-on: windows-2022
    needs: windows

    env:
      VCPKG_ROOT: C:\vcpkg

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup vcpkg
        shell: pwsh
        run: |
          if (!(Test-Path "$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake")) {
            $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
            git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
            "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Verify tools
        shell: pwsh
        run: |
          cmake --version
          ninja --version
          clang-cl --version

      - name: Configure
        shell: pwsh
        run: cmake --preset windows-clang-ci

      - name: Build
        shell: pwsh
        run: |
          $output = cmake --build --preset windows-clang-ci --parallel 2>&1
          $exitCode = $LASTEXITCODE
          $output
          if ($exitCode -ne 0) {
            $message = ($output -join "`n").Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            "::error title=Windows Clang build failed::$message"
            exit $exitCode
          }

      - name: Test
        shell: pwsh
        run: ctest --preset windows-clang-ci

  windows-gcc:
    name: Windows GCC
    runs-on: windows-2022
    needs: windows

    env:
      VCPKG_ROOT: C:\vcpkg

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja

      - name: Setup vcpkg
        shell: msys2 {0}
        run: |
          if [ ! -f "$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" ]; then
            git clone https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
            "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
            echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"
          fi

      - name: Verify tools
        shell: msys2 {0}
        run: |
          export PATH="/ucrt64/bin:$PATH"
          {
            cmake --version
            ninja --version
            gcc --version
            g++ --version
          } 2>&1 | tee verify-tools.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            message=$(sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g' verify-tools.log)
            echo "::error title=Windows GCC tool verification failed::$message"
            exit "$status"
          fi
          test -f "$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Configure
        shell: msys2 {0}
        run: |
          export PATH="/ucrt64/bin:$PATH"
          cmake --preset windows-gcc-ci

      - name: Build
        shell: msys2 {0}
        run: |
          export PATH="/ucrt64/bin:$PATH"
          cmake --build --preset windows-gcc-ci --parallel

      - name: Test
        shell: msys2 {0}
        run: |
          export PATH="/ucrt64/bin:$PATH"
          ctest --preset windows-gcc-ci
